global:
  state_file_path: /app/state/state.json
  proxy_config_path: /app/config/3proxy.cfg
  ipv6_interface: lo                 # надо явно прописывать без автодетекта enp3s0 / wlan0
  inbound_ipv4_address: "127.0.0.1"

  nf_table: weaver
  nf_chain_out: out
  nf_policy_accept: true

  reconcile_remove_extras: false       # чтобы не удалять дополнительные IPv6
  pinned_ipv6: ["fd00:1::100"]         # локалка для тестов;

  # handler health
  handler:
    on_error: accept
    health_window_sec: 60
    persona_pool:
      - target_android_14
      - draft_windows_11
      - draft_ios_17
    persona_weights:
      target_android_14: 0.6
      draft_windows_11: 0.2
      draft_ios_17: 0.2

personas:
  target_android_14:
    ttl: 64
    window_size: 65535
    tcp_options_layout:
      - { name: MSS, value: "calc" }
      - { name: SACK }
      - { name: Timestamps }
      - { name: NOP }
      - { name: WScale, value: "7" }

  draft_windows_11:
    ttl: 128
    window_size: 64240
    tcp_options_layout:
      - { name: MSS, value: "calc" }
      - { name: SACK }
      - { name: NOP }
      - { name: WScale, value: "8" }
      - { name: NOP }
      - { name: NOP }

  draft_ios_17:
    ttl: 64
    window_size: 65535
    tcp_options_layout:
      - { name: MSS, value: "calc" }
      - { name: SACK }
      - { name: Timestamps }
      - { name: NOP }
      - { name: WScale, value: "6" }

# Группы прокси
proxy_groups:
  - name: "android-pool-1"
    ipv6_subnet: "fd00:1::/64"
    count: 10
    proxy_type: "http"
    port_range: { start: 30000, end: 30999 }
    persona: "target_android_14"
    nfqueue_num: 0

  - name: "socks-lab"
    ipv6_subnet: "fd00:1::/64"
    count: 1
    proxy_type: "socks5"
    port_range: { start: 31000, end: 31000 }
    persona: "target_android_14"
    nfqueue_num: 0
